
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>APTIS Speaking Practice – Ms. Thu Nguyễn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial, Helvetica, sans-serif;
  margin:0;
  background:#f6f8fb;
  color:#333;
}
.hidden{display:none}

/* HEADER */
header{
  background:#1e3a8a;
  color:#fff;
  padding:18px 25px;
}
header .top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
header h1{
  margin:0;
  font-size:22px;
}
header button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#fff;
  color:#1e3a8a;
  font-weight:600;
  cursor:pointer;
}
header button:hover{opacity:0.9}

/* MAIN */
main{
  max-width:1100px;
  margin:25px auto;
  padding:0 15px 40px;
}

/* SECTION */
.section{
  background:#fff;
  margin-bottom:25px;
  border-radius:10px;
  padding:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.06);
}
.section h2{
  margin-top:0;
  color:#1e3a8a;
  font-size:18px;
  border-left:5px solid #1e3a8a;
  padding-left:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
  margin-top:15px;
}
.grid a{
  display:block;
  padding:18px;
  background:#f1f5ff;
  border-radius:10px;
  text-decoration:none;
  color:#1e3a8a;
  font-weight:600;
  text-align:center;
  transition:0.2s;
}
.grid a:hover{
  background:#1e3a8a;
  color:#fff;
  transform:translateY(-2px);
}

/* AUTH */
.auth-box{
  max-width:420px;
  margin:90px auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 16px rgba(0,0,0,0.08);
}
.auth-box h2{
  text-align:center;
  color:#1e3a8a;
}
.auth-box label{
  font-size:14px;
  font-weight:600;
}
.auth-box input{
  width:100%;
  padding:10px;
  margin:6px 0 14px;
}
.auth-box button{
  width:100%;
  padding:12px;
  background:#1e3a8a;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}
.switch{
  text-align:center;
  margin-top:12px;
}
.switch span{
  color:#1e3a8a;
  cursor:pointer;
  font-weight:600;
}

footer{
  text-align:center;
  font-size:13px;
  color:#666;
  padding-bottom:30px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">

  <div class="auth-box" id="loginBox">
    <h2>ĐĂNG NHẬP</h2>
    <label>Email</label>
    <input id="loginEmail" type="email">

    <label>Mật khẩu</label>
    <input id="loginPass" type="password">

    <button id="loginBtn">Đăng nhập</button>

    <div class="switch">
      Chưa có tài khoản? <span id="toRegister">Đăng ký</span>
    </div>
  </div>

  <div class="auth-box hidden" id="registerBox">
    <h2>ĐĂNG KÝ TÀI KHOẢN</h2>
    <label>Email</label>
    <input id="regEmail" type="email">

    <label>Mật khẩu</label>
    <input id="regPass" type="password">

    <label>Xác nhận mật khẩu</label>
    <input id="regPass2" type="password">

    <label>Mã PIN (quản trị)</label>
    <input id="regPin" type="password">

    <button id="registerBtn">Đăng ký</button>

    <div class="switch">
      Đã có tài khoản? <span id="toLogin">Đăng nhập</span>
    </div>
  </div>

</div>

<!-- HOME -->
<div id="home" class="hidden">

<header>
  <div class="top">
    <h1>APTIS Speaking Practice – Ms. Thu Nguyễn</h1>
    <button id="logoutBtn">Đăng xuất</button>
  </div>
</header>

<main>

  <div class="section">
    <h2>Practice APTIS SPEAKING TEST</h2>
    <div class="grid">
      <a href="test.html" class="protected">Luyện thi nói</a>
    </div>
  </div>

  <div class="section">
    <h2>Luyện kỹ năng từng Phần thi</h2>
    <div class="grid">
      <a href="phan01/index.html" class="protected">APTIS Part 1</a>
      <a href="phan02/part2-select.html" class="protected">APTIS Part 2</a>
      <a href="phan03/index.html" class="protected">APTIS Part 3</a>
      <a href="phan04/index.html" class="protected">APTIS Part 4</a>
    </div>
  </div>

</main>

<footer>© Ms. Thu Nguyễn – English for Beginners</footer>
</div>

<script>
const ADMIN_PIN = "213617";

// DOM
const auth = document.getElementById("auth");
const home = document.getElementById("home");

const loginBox = document.getElementById("loginBox");
const registerBox = document.getElementById("registerBox");

const loginEmail = document.getElementById("loginEmail");
const loginPass = document.getElementById("loginPass");

const regEmail = document.getElementById("regEmail");
const regPass = document.getElementById("regPass");
const regPass2 = document.getElementById("regPass2");
const regPin = document.getElementById("regPin");

document.getElementById("toRegister").onclick = () => {
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
};

document.getElementById("toLogin").onclick = () => {
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
};

document.getElementById("registerBtn").onclick = () => {
  if(regPin.value !== ADMIN_PIN){
    alert("Sai mã PIN quản trị");
    return;
  }
  if(regPass.value !== regPass2.value){
    alert("Mật khẩu không khớp");
    return;
  }
  localStorage.setItem("email", regEmail.value);
  localStorage.setItem("pass", regPass.value);
  alert("Đăng ký thành công");
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
};

document.getElementById("loginBtn").onclick = () => {
  if(
    loginEmail.value === localStorage.getItem("email") &&
    loginPass.value === localStorage.getItem("pass")
  ){
    localStorage.setItem("logged","1");
    showHome();
  } else {
    alert("Sai email hoặc mật khẩu");
  }
};

document.getElementById("logoutBtn").onclick = () => {
  localStorage.removeItem("logged");
  location.reload();
};

function showHome(){
  auth.classList.add("hidden");
  home.classList.remove("hidden");
}

// Protect links
document.querySelectorAll(".protected").forEach(link=>{
  link.addEventListener("click", function(e){
    if(localStorage.getItem("logged") !== "1"){
      e.preventDefault();
      alert("Bạn cần đăng nhập trước");
    }
  });
});

if(localStorage.getItem("logged") === "1"){
  showHome();
}
</script>

</body>
</html>
