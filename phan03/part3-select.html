<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APTIS Speaking Part 3 - Select Test</title>
<link rel="stylesheet" href="style.css">

<style>

/* ===== TOP BAR ===== */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:#1e3a8a;
    color:#fff;
    flex-wrap:wrap;
}
.top-bar .left{
    font-weight:bold;
    font-size:16px;
}
.top-bar .actions{
    display:flex;
    gap:8px;
}
.top-bar .actions a,
.top-bar .actions button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#fff;
    color:#1e3a8a;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    font-size:14px;
}

/* ===== PAGE ===== */
header{
    text-align:center;
    margin:30px 10px 10px;
}
header h1{
    font-size:24px;
}
header p{
    font-size:16px;
    color:#555;
}

/* ===== GRID ===== */
.test-container{
    max-width:1100px;
    margin:30px auto;
    padding:0 15px;
}
.test-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:15px;
}

.test-grid a{
    display:block;
    padding:18px;
    background:#f1f5ff;
    border-radius:12px;
    text-align:center;
    font-weight:700;
    font-size:16px;
    color:#1e3a8a;
    text-decoration:none;
    transition:0.2s;
}

.test-grid a:hover{
    background:#1e3a8a;
    color:#fff;
    transform:translateY(-3px);
}

/* ===== MOBILE OPTIMIZE ===== */
@media(max-width:600px){
    header h1{
        font-size:20px;
    }
    .test-grid a{
        padding:22px;
        font-size:18px;
    }
    .top-bar{
        flex-direction:column;
        align-items:flex-start;
        gap:8px;
    }
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="left">
        APTIS Speaking Practice – Ms. Thu Nguyễn
    </div>
    <div class="actions">
        <a href="../index.html">🏠 Trang chủ</a>
        <button id="logoutBtn">🚪 Đăng xuất</button>
    </div>
</div>

<header>
    <h1>APTIS Speaking – Part 3</h1>
    <p>Select a Practice Test</p>
</header>

<div class="test-container">
    <div class="test-grid" id="testGrid">
        <!-- Buttons generated by JS -->
    </div>
</div>

<script>

/* ===== CHECK LOGIN ===== */
if(localStorage.getItem("logged") !== "1"){
    alert("Bạn cần đăng nhập trước");
    window.location.href = "../index.html";
}

/* ===== LOGOUT ===== */
document.getElementById("logoutBtn").addEventListener("click", function(){
    localStorage.removeItem("logged");
    window.location.href = "../index.html";
});

/* ===== GENERATE 37 TEST BUTTONS ===== */
const grid = document.getElementById("testGrid");

for(let i=1; i<=37; i++){
    const link = document.createElement("a");
    link.href = `part3.html?test=${i}`;
    link.textContent = `Practice Test ${i}`;
    grid.appendChild(link);
}

</script>

</body>
</html>
